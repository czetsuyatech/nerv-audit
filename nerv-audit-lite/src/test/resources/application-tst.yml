spring:
  # Datasource Configuration
  datasource:
    url: jdbc:h2:mem:nerv;DATABASE_TO_UPPER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: nerv
    password: nerv

  jpa:
    hibernate:
      ddl-auto: none

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/nerv-audit/db.changelog-nerv-audit.xml
    default-schema: public
    drop-first: false
